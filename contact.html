<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mark Lim — Contact</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="contact-page">
    <div class="page">
      <header class="site-header">
        <h1 class="brand">MARK LIM</h1>

        <button
          class="menu-btn"
          type="button"
          aria-label="Open menu"
          data-menu-btn
        >
          <span class="bar" aria-hidden="true"></span>
        </button>
      </header>

      <main class="main">
        <section class="contact-wrap" aria-label="Contact options">
          <div class="contact-row">
            <div class="contact-item">
              <h2 class="contact-word">CALL</h2>
              <span class="contact-me" aria-hidden="true">me</span>
              <p class="contact-sub">(PLEASE DON’T)</p>
              <!-- optional actual phone link:
            <p><a href="tel:+1XXXXXXXXXX">+1 (xxx) xxx-xxxx</a></p>
            --></div>

            <div class="contact-item">
              <h2 class="contact-word">EMAIL</h2>
              <span class="contact-me" aria-hidden="true">me</span>
              <p class="contact-sub">(PLEASE DO)</p>
              <!-- optional:
            <p><a href="mailto:you@domain.com">you@domain.com</a></p>
            --></div>

            <div class="contact-item">
              <h2 class="contact-word">FOLLOW</h2>
              <span class="contact-me" aria-hidden="true">me</span>
              <p class="contact-sub">(WHY NOT)</p>
              <!-- optional:
            <p><a href="https://instagram.com/yourhandle" target="_blank" rel="noreferrer">@yourhandle</a></p>
            --></div>
          </div>
        </section>
      </main>
    </div>

    <!-- Menu Overlay -->
    <div class="menu-overlay" data-menu-overlay aria-hidden="true">
      <div class="menu-inner">
        <nav class="menu-links" aria-label="Main navigation">
          <a href="./about.html">ABOUT</a>
          <a href="./index.html">WORK</a>
          <a href="./reel.html">REEL</a>
          <a href="./contact.html">CONTACT</a>
        </nav>
      </div>
    </div>

    <script src="./js/menu.js"></script>
  </body>
</html>
