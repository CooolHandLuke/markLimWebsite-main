<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mark Lim — Reel</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="reel-page">
    <!-- Fullscreen Video Layer -->
    <div class="reel" aria-hidden="true">
      <video
        src="./assets/img/video/directingreel.mov"
        autoplay
        loop
        playsinline
        data-reel-video
      ></video>
    </div>

    <div class="page">
      <header class="site-header">
        <h1 class="brand">MARK LIM</h1>

        <button
          class="menu-btn"
          type="button"
          aria-label="Open menu"
          data-menu-btn
        >
          <span class="bar" aria-hidden="true"></span>
        </button>

        <button
          class="reel-audio-btn"
          type="button"
          aria-label="Mute reel audio"
          aria-pressed="false"
          data-audio-btn
        >
          <span class="reel-audio-btn__label" data-audio-label>ON</span>
        </button>
      </header>
    </div>

    <!-- Menu Overlay -->
    <div class="menu-overlay" data-menu-overlay aria-hidden="true">
      <div class="menu-inner">
        <nav class="menu-links" aria-label="Main navigation">
          <a href="./about.html">ABOUT</a>
          <a href="./index.html">WORK</a>
          <a href="./reel.html">REEL</a>
          <a href="./contact.html">CONTACT</a>
        </nav>
      </div>
    </div>

    <script src="./js/menu.js"></script>
    <script src="./js/reel.js"></script>
  </body>
</html>
